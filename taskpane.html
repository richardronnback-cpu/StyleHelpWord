<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StyleHelp</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>
  <div id="styleHeader">
    <span id="styleSymbol" class="style-symbol">¶</span>
    <span id="styleName" class="style-name"></span>
  </div>

  <textarea id="titleField" readonly spellcheck="false" placeholder="No title"></textarea>
  <textarea id="descriptionField" readonly spellcheck="false" placeholder="No description"></textarea>

  <div class="toolbar">
    <div id="colorSwatch"></div>
    <span id="statusText" class="status-text"></span>
  </div>

  <div id="urlSection" class="url-section">
    <div class="url-label">Style definitions URL:</div>
    <input type="text" id="urlInput" placeholder="https://…/styles.json" spellcheck="false" />
    <button id="btnLoadUrl" class="btn">Load</button>
  </div>

  <script src="taskpane.js"></script>
</body>
</html>
